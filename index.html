<!DOCTYPE html>
<html>
<head>
    <title>Manual Web Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Use Decimal Degrees for the WENT site area
    var map = L.map('map').setView([22.4184, 113.931], 15); 

    // Standard OpenStreetMap Base
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Your Custom Georeferenced Image Tiles
    // Use the GitHub URL if you are testing online, or './tiles/...' for local
    L.tileLayer('https://yobeeyuen.github.io/survey-map-went/tiles/{z}/{x}/{y}.png', {
        minZoom: 15,
        maxZoom: 20,
        tms: false,
        opacity: 0.8
    }).addTo(map);
</script>
</body>
</html>
