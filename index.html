<!DOCTYPE html>
<html>
<head>
    <title>My Georeferenced Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the map
        var map = L.map('map').setView([22.4184, 113.9313], 15);

        // Add a base layer (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Add YOUR georeferenced tiles
        // The {z}/{x}/{y} pattern points to the folder structure created by GDAL
        L.tileLayer('./tiles/{z}/{x}/{y}.png', {
    tms: false, 
    opacity: 0.8,
    minZoom: 0,    // Allow zooming out to level 0
    maxZoom: 20,   // Allow zooming in to level 20
    maxNativeZoom: 20, // Tells Leaflet the highest folder number available
    attribution: 'WENT Landfill Imagery'
}).addTo(map);
    </script>
</body>
</html>
