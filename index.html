<!DOCTYPE html>
<html>
<head>
    <title>Manual Web Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Replace these coordinates with your site center (Lat, Lng)
        var map = L.map('map').setView([22.41872, 113.93133], 16);

        // Standard OpenStreetMap Base
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Your Custom Georeferenced Image Tiles
        // The path './tiles/{z}/{x}/{y}.png' looks for the folder you just made
        L.tileLayer('./tiles/{z}/{x}/{y}.png', {
            maxZoom: 20,
            opacity: 0.8
        }).addTo(map);
    </script>
</body>
</html>
